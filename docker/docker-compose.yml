# HomeTube — Docker Compose stack.
#
# Local development runs via Tilt (see Tiltfile), not via this file.
# This stack is for production-style deployments: a Linux host with
# Docker installed, or TrueNAS Scale (ElectricEel 24.10+) Custom Apps.
#
# Three services:
#   app        — HomeTube backend + frontend (pulled from GHCR)
#   discovery  — youtubei.js sidecar for YouTube content discovery
#   pot-server — bgutil PO token generator for bot-detection bypass
#
# Conventions:
#   - Pulls pre-built images from GHCR — no `build:` (TrueNAS does not
#     build images, and pre-built images are faster everywhere else).
#   - Uses host bind mounts so backups/snapshots happen at the
#     filesystem layer (ZFS on TrueNAS, your tool of choice elsewhere).
#   - Runs containers as UID/GID 568 by default — matches TrueNAS's
#     `apps` user. Override with HOMETUBE_UID/GID on other hosts.
#   - Defaults to `:latest`. Override HOMETUBE_VERSION to pin a build.
#
# Persistent state is split across three independent bind mounts so
# each can live on different storage. The app never reads across them:
#   HOMETUBE_DATABASE → /app/data/database  (SQLite — small, fsync-heavy;
#                                            put on SSD/NVMe)
#   HOMETUBE_TOOLS    → /app/data/tools     (yt-dlp binary + cookies.txt;
#                                            small, latency-sensitive)
#   HOMETUBE_CACHE    → /app/data/cache     (DASH segment cache — large,
#                                            regeneratable; fine on
#                                            spinning disk or a NAS)
#
# Deployment (TrueNAS Scale):
#   1. Create three datasets (or reuse one for all three), e.g.
#      tank/ssd/hometube/database, tank/ssd/hometube/tools,
#      tank/bulk/hometube/cache. chown each to 568:568.
#   2. Apps → Discover Apps → Custom App → paste this YAML. Set
#      HOMETUBE_DATABASE / HOMETUBE_TOOLS / HOMETUBE_CACHE; override
#      others as needed.
#
# Deployment (plain Docker host):
#   HOMETUBE_DATABASE=/srv/hometube/database \
#   HOMETUBE_TOOLS=/srv/hometube/tools \
#   HOMETUBE_CACHE=/srv/hometube/cache \
#     docker compose up -d
#
# Env vars:
#   HOMETUBE_REGISTRY  — registry/namespace prefix (default ghcr.io/jimsimon)
#   HOMETUBE_VERSION   — image tag for hometube + discovery (default latest)
#   HOMETUBE_PORT      — host port to expose the web UI on (default 30000)
#   HOMETUBE_DATABASE  — host path for the SQLite database (REQUIRED)
#   HOMETUBE_TOOLS     — host path for yt-dlp + cookies (REQUIRED)
#   HOMETUBE_CACHE     — host path for the segment cache (REQUIRED)
#   HOMETUBE_UID/GID   — runtime user (default 568:568, TrueNAS `apps`)

services:
  app:
    image: ${HOMETUBE_REGISTRY:-ghcr.io/jimsimon}/hometube:${HOMETUBE_VERSION:-latest}
    user: "${HOMETUBE_UID:-568}:${HOMETUBE_GID:-568}"
    ports:
      - "${HOMETUBE_PORT:-30000}:3000"
    volumes:
      - ${HOMETUBE_DATABASE:?HOMETUBE_DATABASE must be set}:/app/data/database
      - ${HOMETUBE_TOOLS:?HOMETUBE_TOOLS must be set}:/app/data/tools
      - ${HOMETUBE_CACHE:?HOMETUBE_CACHE must be set}:/app/data/cache
    environment:
      DISCOVERY_SIDECAR_URL: http://discovery:3000
      POT_SERVER_URL: http://pot-server:4416
    depends_on:
      discovery:
        condition: service_healthy
      pot-server:
        # The upstream bgutil image doesn't include wget/curl, so we
        # can't run a meaningful in-container healthcheck. Gate only on
        # the container being up; if pot-server isn't actually ready
        # yet when yt-dlp first calls it, the plugin retries.
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # YouTube content discovery sidecar — youtubei.js (InnerTube API).
  # Not exposed to the host; only reachable by `app` on the internal
  # Docker network at discovery:3000.
  discovery:
    image: ${HOMETUBE_REGISTRY:-ghcr.io/jimsimon}/hometube-discovery:${HOMETUBE_VERSION:-latest}
    # Override the image's baked-in `node` user (UID 1000) so files
    # written by the container — should there ever be any — match the
    # TrueNAS apps user.
    user: "${HOMETUBE_UID:-568}:${HOMETUBE_GID:-568}"
    # Run tini as PID 1 so Node receives SIGTERM cleanly on restart.
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # PO (Proof-of-Origin) token server. Upstream image — tracks `:latest`
  # by convention with the rest of this stack. Pin to a specific tag
  # from https://hub.docker.com/r/brainicism/bgutil-ytdlp-pot-provider/tags
  # if you want deliberate upgrades instead of recreate-time drift.
  pot-server:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    # No healthcheck: the upstream image is minimal and ships without
    # wget or curl, so there's no in-container way to probe it. The
    # `app` service gates on this container being started rather than
    # healthy; yt-dlp's bgutil plugin retries on transient failures.
