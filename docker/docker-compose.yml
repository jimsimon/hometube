# HomeTube — Docker Compose stack.
#
# Two services:
#   app       — the HomeTube backend + frontend
#   pot-server — bgutil PO token generator for YouTube bot-detection bypass

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hometube:local
    ports:
      - "3000:3000"
    volumes:
      # SQLite DB, segment cache, downloaded yt-dlp binary updates.
      - app-data:/app/data
    depends_on:
      pot-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PO (Proof-of-Origin) token server — generates tokens that prove
  # requests come from a legitimate browser. yt-dlp's bgutil plugin
  # fetches tokens from this server automatically.
  pot-server:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    # No ports exposed to host — only reachable by the app container
    # via Docker's internal network at pot-server:4416.
    restart: unless-stopped

volumes:
  app-data:
