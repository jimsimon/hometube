name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -----------------------------------------------------------------------
  # Lint & format — fast feedback, runs first.
  # -----------------------------------------------------------------------
  lint-and-format:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # ----- Frontend -----
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Oxfmt — check
        run: npx oxfmt --check ./src
        working-directory: frontend

      - name: Oxlint
        run: npx oxlint ./src
        working-directory: frontend

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      # ----- Backend -----
      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # -----------------------------------------------------------------------
  # Unit tests + coverage. Build fails if coverage drops below 80%.
  # -----------------------------------------------------------------------
  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # ----- Frontend tests + coverage -----
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Vitest runs in browser mode (Playwright provider, headless Chromium).
      - name: Install Playwright Chromium for vitest browser mode
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # Coverage thresholds (50% on src/services/) live in vitest.config.ts.
      - name: Vitest (browser mode + coverage)
        run: npx vitest run --coverage
        working-directory: frontend

      # ----- Backend tests + coverage -----
      # Coverage threshold lowered to 50% as a starting baseline; raise as the suite grows.
      - name: Cargo tests with coverage
        run: cargo llvm-cov --fail-under-lines 50 --lcov --output-path lcov.info

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            frontend/coverage/
            lcov.info

  # -----------------------------------------------------------------------
  # Production build. Verifies the release binary + frontend bundle build.
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Build backend (release)
        run: cargo build --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hometube-release
          path: |
            target/release/hometube
            frontend/dist/

  # -----------------------------------------------------------------------
  # End-to-end + accessibility. Boots the release binary and runs Playwright
  # against it. axe-core violations at "critical" or "serious" severity
  # fail the build.
  # -----------------------------------------------------------------------
  e2e:
    name: E2E + a11y
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install e2e dependencies
        run: npm install --no-audit --no-fund
        working-directory: e2e

      - name: Build backend (release)
        run: cargo build --release --locked

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run server + Playwright
        run: |
          mkdir -p data
          ./target/release/hometube &
          SERVER_PID=$!

          # Wait for /api/health (max 30s).
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              echo "server ready"
              break
            fi
            sleep 1
          done

          # Run the e2e suite from its own package; tear down the
          # server on failure so the runner doesn't hang.
          EXIT=0
          (cd e2e && npx playwright test) || EXIT=$?

          kill $SERVER_PID || true
          exit $EXIT
        env:
          DATABASE_PATH: ./data/test.db

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/report/
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Build + push the Docker image (main only).
  # -----------------------------------------------------------------------
  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
