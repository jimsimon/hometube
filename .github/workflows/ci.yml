name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -----------------------------------------------------------------------
  # Lint — static analysis for frontend and backend.
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # ----- Frontend -----
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Oxlint
        run: npx oxlint ./src
        working-directory: frontend

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      # ----- Backend -----
      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # -----------------------------------------------------------------------
  # Format — code formatting checks for frontend and backend.
  # -----------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # ----- Frontend -----
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Oxfmt — check
        run: npx oxfmt --check ./src
        working-directory: frontend

      # ----- Backend -----
      - name: Cargo fmt
        run: cargo fmt --all -- --check

  # -----------------------------------------------------------------------
  # Unit + integration tests with coverage.
  # Build fails if coverage drops below 80%.
  # -----------------------------------------------------------------------
  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # ----- Frontend tests + coverage -----
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Vitest runs in browser mode (Playwright provider, headless Chromium).
      - name: Install Playwright Chromium for vitest browser mode
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # Coverage thresholds (80% lines/statements, 75% functions, 70% branches) live in vitest.config.ts.
      - name: Vitest (browser mode + coverage)
        run: npx vitest run --coverage
        working-directory: frontend

      # ----- Backend unit + integration tests with coverage -----
      - name: Cargo tests with coverage
        run: cargo llvm-cov --fail-under-lines 80 --lcov --output-path lcov.info

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            frontend/coverage/
            lcov.info

  # -----------------------------------------------------------------------
  # Production build. Verifies the release binary + frontend bundle build.
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Build backend (release)
        run: cargo build --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hometube-release
          path: |
            target/release/hometube
            frontend/dist/

  # -----------------------------------------------------------------------
  # End-to-end + accessibility. Boots the release binary and runs Playwright
  # against it. axe-core violations at "critical" or "serious" severity
  # fail the build.
  # -----------------------------------------------------------------------
  e2e:
    name: E2E + a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install e2e dependencies
        run: npm install --no-audit --no-fund
        working-directory: e2e

      - name: Build backend (release + test-login feature)
        run: cargo build --release --locked --features test-login

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run server + Playwright
        run: |
          mkdir -p data/database data/tools data/cache
          ./target/release/hometube &
          SERVER_PID=$!

          # Wait for /api/health (max 30s).
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              echo "server ready"
              break
            fi
            sleep 1
          done

          # Run the e2e suite from its own package; tear down the
          # server on failure so the runner doesn't hang.
          EXIT=0
          (cd e2e && npx playwright test) || EXIT=$?

          kill $SERVER_PID || true
          exit $EXIT
        env:
          DATABASE_PATH: ./data/database/test.db

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/report/
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Build + push the Docker image. Runs only for semver-tagged releases
  # (e.g. v1.2.3, v1.2.3-rc.1). Pushes to main are CI-only so we can
  # validate changes before cutting a release.
  # Depends on all checks passing.
  # -----------------------------------------------------------------------
  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [lint, format, test, build, e2e]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            type=sha,format=long

      - name: Build + push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (discovery sidecar)
        id: meta-discovery
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-discovery
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            type=sha,format=long

      - name: Build + push discovery sidecar image
        uses: docker/build-push-action@v7
        with:
          context: sidecar/discovery
          file: sidecar/discovery/Dockerfile
          push: true
          tags: ${{ steps.meta-discovery.outputs.tags }}
          labels: ${{ steps.meta-discovery.outputs.labels }}
          cache-from: type=gha,scope=discovery
          cache-to: type=gha,mode=max,scope=discovery
