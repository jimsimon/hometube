{% extends "base-parent.html" %}

{% block title %}Family playlist — HomeTube{% endblock %}

{% block content %}
<section class="page-content" aria-label="Family playlist" style="max-width: 64rem;">
  <p>
    <a href="/parent/playlists" class="back-link">← Back to playlists</a>
  </p>
  <div class="page-section">
    <hometube-family-playlist-detail
      playlist-id="{{ playlist_id }}"
    ></hometube-family-playlist-detail>
  </div>
</section>
{% endblock %}

{% block head %}
<style>
  .back-link {
    color: var(--wa-color-brand-on-quiet);
    text-decoration: none;
  }
</style>
{% endblock %}

{% block page_scripts %}
<script type="module" src="/assets/components/family-playlist-detail.js"></script>
<script type="module" src="/assets/components/family-playlist-form.js"></script>
{% endblock %}
