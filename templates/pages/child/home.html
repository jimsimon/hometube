{% extends "base-child.html" %}

{% block title %}HomeTube{% endblock %}

{% block content %}
<section class="child-home page-content" aria-label="Home">
  <hometube-video-row
    feed="continue-watching"
    heading="Continue watching"
  ></hometube-video-row>

  <hometube-video-row
    feed="new-videos"
    heading="New videos"
  ></hometube-video-row>

  <noscript>
    <h2>Your videos</h2>
    {% include "partials/video-grid.html" %}
  </noscript>
</section>
{% endblock %}

{% block page_scripts %}
<script type="module" src="/assets/components/video-row.js"></script>
<script type="module" src="/assets/components/video-card.js"></script>
{% endblock %}
