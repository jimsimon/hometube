<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}HomeTube{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo-180.png" />
    <meta name="theme-color" content="#1565C0" />

    <!-- Web Awesome stylesheet (theme tokens, base styles). -->
    <link
      rel="stylesheet"
      href="https://ka-f.webawesome.com/webawesome@3.6.0/styles/webawesome.css"
    />
    <!-- Web Awesome auto-loader: lazily registers components as it
         encounters them in the DOM. -->
    <script
      type="module"
      src="https://ka-f.webawesome.com/webawesome@3.6.0/webawesome.loader.js"
    ></script>

    <link rel="stylesheet" href="/assets/styles/global.css" />

    <!-- Apply persisted theme as early as possible to avoid flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('hometube-theme') || 'system';
          if (t === 'system') {
            t = matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('wa-dark');
        } catch (e) {}
      })();
    </script>

    {% block head %}{% endblock %}
  </head>
  <body>
    <!-- Preload components used inside shadow DOM (auto-loader only scans light DOM). -->
    <div hidden data-wa-preload="wa-dropdown wa-dropdown-item wa-dialog wa-button"></div>

    <wa-page mobile-breakpoint="768" {% block page_attrs %}disable-navigation-toggle{% endblock %}>
      <header slot="header">
        {% block nav_toggle %}{% endblock %}
        <a href="/" class="brand">
          <img src="/assets/logo.svg" alt="" class="brand-logo" width="32" height="32" />
          <span class="brand-name">HomeTube</span>
        </a>
        {% block header_actions %}
        <div class="header-actions">
          <hometube-theme-toggle></hometube-theme-toggle>
        </div>
        {% endblock %}
      </header>

      {% block navigation %}{% endblock %}

      <main>{% block content %}{% endblock %}</main>

      <footer slot="footer">
        <small>HomeTube &mdash; AGPL-3.0</small>
      </footer>
    </wa-page>

    <!-- Global components used on every page. -->
    <script type="module" src="/assets/components/theme-toggle.js"></script>
    <!-- MPA View Transitions (directional animations). -->
    <script type="module" src="/assets/services/view-transitions.js"></script>
    <!-- Service worker registration (Cache-API offline + precache). -->
    <script type="module" src="/assets/services/sw-register.js"></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
