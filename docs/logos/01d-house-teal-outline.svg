<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>HomeTube — House Outline + Soft Play (Teal)</title>
  <!-- Outlined / line-art style — visually very distinct from YT's solid red badge -->
  <g fill="none" stroke="#00796B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Roof + body as continuous outline -->
    <path d="M26 96 L100 30 L174 96 L174 172 Q174 180 166 180 L34 180 Q26 180 26 172 Z"/>
    <!-- Chimney -->
    <path d="M138 50 L138 70 L154 70 L154 64"/>
  </g>
  <!-- Soft filled "screen" inside -->
  <rect x="50" y="108" width="100" height="64" rx="10" fill="#B2DFDB"/>
  <!-- Stylised play: a soft pentagon, not a sharp triangle -->
  <path d="M90 124
           L118 136
           Q122 138 118 140
           L90 152
           Q86 154 86 150
           L86 128
           Q86 122 90 124 Z"
        fill="#00796B"/>
</svg>
