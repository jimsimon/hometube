<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>HomeTube — House + Family Pictogram (Purple)</title>
  <defs>
    <linearGradient id="g1c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <!-- Roof -->
  <path d="M100 22 L182 92 L162 92 L162 96 L38 96 L38 92 L18 92 Z" fill="#FFCA28"/>
  <!-- House body -->
  <rect x="38" y="92" width="124" height="92" rx="14" fill="url(#g1c)"/>
  <!-- Inner screen -->
  <rect x="50" y="104" width="100" height="68" rx="8" fill="#FFF8F0"/>
  <!-- Instead of a play triangle: a tiny family pictogram (parent + child) -->
  <!-- Parent -->
  <circle cx="86" cy="124" r="7" fill="#6A1B9A"/>
  <path d="M74 156 Q74 138 86 138 Q98 138 98 156 Z" fill="#6A1B9A"/>
  <!-- Child -->
  <circle cx="112" cy="130" r="5" fill="#AB47BC"/>
  <path d="M104 156 Q104 142 112 142 Q120 142 120 156 Z" fill="#AB47BC"/>
  <!-- Ground line -->
  <rect x="58" y="160" width="84" height="4" rx="2" fill="#E1BEE7"/>
  <!-- Chimney -->
  <rect x="138" y="42" width="16" height="26" fill="#FFCA28"/>
</svg>
