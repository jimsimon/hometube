<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>HomeTube (maskable)</title>
  <defs>
    <linearGradient id="ht-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="ht-body-m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="ht-roof-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for "maskable" purpose; logo fits inside
       the central 80% safe zone (icon scaled to ~60% of canvas). -->
  <rect width="200" height="200" fill="url(#ht-bg)"/>
  <g transform="translate(40 40) scale(0.6)">
    <path d="M100 22 L182 92 L162 92 L162 96 L38 96 L38 92 L18 92 Z" fill="url(#ht-roof-m)"/>
    <rect x="38" y="92" width="124" height="92" rx="14" fill="url(#ht-body-m)"/>
    <rect x="50" y="104" width="100" height="68" rx="8" fill="#FFF8F0"/>
    <circle cx="100" cy="138" r="22" fill="#0D47A1"/>
    <path d="M94 128 L94 148 L112 138 Z" fill="#FFF8F0"/>
    <rect x="138" y="42" width="16" height="26" fill="#64B5F6"/>
  </g>
</svg>
