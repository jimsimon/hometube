<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomeTube — Offline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #111;
        color: #f4f4f4;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 32rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0.5rem 0;
        color: #ccc;
      }
      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>Reconnect to the internet to watch online videos.</p>
      <p>
        Downloaded videos are still available — open the
        <a href="/child/downloads">Downloads</a> page.
      </p>
      <p style="font-size: 0.85rem; color: #888">
        Downloads may be unavailable in private browsing.
      </p>
    </main>
  </body>
</html>
